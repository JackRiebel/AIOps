version: '3.8'

services:
  # PostgreSQL database for credentials and audit logs
  # Using pgvector image for vector similarity search (RAG knowledge base)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: meraki-mcp-postgres
    environment:
      POSTGRES_DB: meraki_mcp
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d meraki_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meraki-mcp-network
    restart: unless-stopped

  # Meraki Dashboard MCP Server
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meraki-mcp-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://mcp_user:${DB_PASSWORD:-changeme}@postgres:5432/meraki_mcp

      # Meraki Dashboard Connection
      MERAKI_API_KEY: ${MERAKI_API_KEY}
      MERAKI_BASE_URL: ${MERAKI_BASE_URL:-https://api.meraki.com/api/v1}
      MERAKI_VERIFY_SSL: ${MERAKI_VERIFY_SSL:-true}

      # Security
      EDIT_MODE_ENABLED: ${EDIT_MODE_ENABLED:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-in-production}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./openapi_specs:/app/openapi_specs:ro
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    networks:
      - meraki-mcp-network
    restart: unless-stopped
    command: ["sh", "-c", "echo 'Waiting for database...' && sleep 5 && echo 'Initializing database...' && python scripts/init_database.py && echo 'Starting MCP server...' && python src/main.py"]

  # FastAPI Web API Backend
  web-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meraki-mcp-web-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://mcp_user:${DB_PASSWORD:-changeme}@postgres:5432/meraki_mcp

      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8002:8000"
    volumes:
      - ./src:/app/src
      - ./openapi_specs:/app/openapi_specs:ro
      - ./logs:/app/logs
    networks:
      - meraki-mcp-network
    restart: unless-stopped
    command: ["sh", "-c", "echo 'Starting FastAPI Web API...' && uvicorn src.api.web_api:app --host 0.0.0.0 --port 8000 --reload"]

  # Next.js Web UI
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8002
    container_name: meraki-mcp-web-ui
    depends_on:
      - web-api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8002
    ports:
      - "7001:3000"
    networks:
      - meraki-mcp-network
    restart: unless-stopped

networks:
  meraki-mcp-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
